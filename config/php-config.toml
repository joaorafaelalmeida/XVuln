[[runs]]

tool = "hadolint"
option = "scan"
args = ["superset/Dockerfile"]

[[runs]]

tool = "semgrep"
option = "scan"
args = ["superset"]
platform = "linux/amd64"

[[runs]]

tool = "dependency_check"
option = "scan"
args = ["superset/requirements/base.txt"]
platform = "linux/amd64"

[[runs]]

tool = "horusec"
option = "scan"
args = ["superset"]

[[runs]]

tool = "gitleaks"
option = "detect"
args = ["superset"]
custom_args = "--exit-code 0"

[[runs]]

tool = "dockle"
option = "image"
args = ["apache/superset"]
custom_args = "--timeout 600s"

[[runs]]

tool = "trivy"
option = "scan"
args = ["superset"]	# scan option
#args = ["apache/superset"]	# image option
depends_on = ["dockle"]

[[runs]]

tool = "zap"
option = "scan"
args = ["http://localhost:8080/"] # url of the running webserver to be analyzed by zap

[[runs]]

tool = "grype"
option = "scan"
args = ["superset"]	# scan option
#args = ["apache/superset"]	# image option

