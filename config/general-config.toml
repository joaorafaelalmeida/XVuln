#############################
# Secret scanning
#############################

[[runs]]

tool = "gitleaks"
option = "detect"
args = ["superset"]
custom_args = "--exit-code 0"

#############################
# Container scanning
#############################

[[runs]]

tool = "dockle"
option = "image"
args = ["apache/superset"]
custom_args = "--timeout 600s"

[[runs]]

tool = "hadolint"
option = "scan"
args = ["superset/Dockerfile"]

[[runs]]

tool = "trivy"
option = "scan"
args = ["superset"]	# scan option
#args = ["apache/superset"]	# image option
depends_on = ["dockle"]

