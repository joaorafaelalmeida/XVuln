#############################
# SCA
#############################

[[runs]]

tool = "dependency_check"
option = "scan"
args = ["superset/requirements/base.txt"]
platform = "linux/amd64"

#############################
# DAST
#############################

[[runs]]

tool = "zap"
option = "scan"
args = ["http://localhost:8080/"] # url of the running webserver to be analyzed by zap
