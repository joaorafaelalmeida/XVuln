services:
  orchestrator:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    image: joaorafaelalmeida/trustvuln
    volumes:
      - ${ORCHESTRATOR_INPUT_HOST_DIR}:/input:ro
      - ${ORCHESTRATOR_OUTPUT_HOST_DIR}:/output:rw
      - ${CONFIG_HOST_DIR}:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw 
    command:
      - "orchestrator"
      - "--input-dir-host"
      - "${ORCHESTRATOR_INPUT_HOST_DIR}"
      - "--output-dir-host"
      - "${ORCHESTRATOR_OUTPUT_HOST_DIR}"
      - "--config-dir-host"
      - "${CONFIG_HOST_DIR}"
      - "--config"
      - "/config/${ORCHESTRATOR_CONFIG_FILE}"
      - "--message-level"
      - "${ORCHESTRATOR_MSG_LVL}"
      - "--keep-images"
  report:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    image: joaorafaelalmeida/trustvuln
    volumes:
      - ${REPORT_INPUT_HOST_DIR}:/input:rw
      - ${REPORT_OUTPUT_HOST_DIR}:/output:rw
      - ${CONFIG_HOST_DIR}:/config:ro
    command:
      - "report"
      - "--type"
      - "${REPORT_TYPE}"
      - "--message-level"
      - "${ORCHESTRATOR_MSG_LVL}"
  upload:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    image: joaorafaelalmeida/trustvuln
    network_mode: "host"
    volumes:
      - ${UPLOAD_INPUT_HOST_DIR}:/input:rw
      - ${CONFIG_HOST_DIR}:/config:ro
    command:
      - "upload"
      - "--config"
      - "/config/${UPLOAD_CONFIG_FILE}"
      - "--auth-key"
      - "${UPLOAD_AUTH_KEY}"
      - "--message-level"
      - "${ORCHESTRATOR_MSG_LVL}"
